## Homepage about
- id: "about_title"
  translation: "Mon entreprise"

- id: "about_content"
  translation:  <p class="lead">
        Je suis actuellement en alternance chez <b>Rivrs</b>.
      </p>
      <p class="lead">
        <b>Rivrs</b> est une entreprise <b>Rennaise</b> de création de jeux <u>UGC</u> (User-Generated Content) dans des jeux vidéos tels
        que Minecraft, Roblox, ainsi que GTA V.
      </p>
      <p class="lead">
        Mon travail consiste à développer en <b>Lua</b> des outils internes à l'entreprise dans l'objectif de simplifier la création de nos futurs jeux sur la plateforme <b>Roblox</b>.
      </p>

- id: "about_button"
